services:
  db:
    image: mysql:latest
    container_name: appdb
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: khmerjavadb
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    ports:
      - 3306:3306
    volumes:
      - appdb_data:/var/lib/mysql

volumes:
  appdb_data:
